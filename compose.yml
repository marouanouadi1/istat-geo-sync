services:
  cli:
    image: node:latest
    container_name: istat-geo-sync-cli
    working_dir: /app
    volumes:
      - ./:/app
      - node-modules:/app/node_modules
  postgres:
    image: postgres:latest
    container_name: istat-geo-sync-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: istat_geo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mysql:
    image: mysql:latest
    container_name: istat-geo-sync-mysql
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: istat_geo
      MYSQL_USER: istat
      MYSQL_PASSWORD: istat
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
        
volumes:
  postgres-data:
  mysql-data:
  node-modules: